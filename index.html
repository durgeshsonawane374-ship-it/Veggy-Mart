<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veggy Mart - ताजी भाजी थेट शेतातून</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Hind', sans-serif; background-color: #f8fafc; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="pb-44">

    <header class="bg-green-700 text-white p-6 shadow-2xl rounded-b-[50px] sticky top-0 z-50 border-b-4 border-yellow-400">
        <div class="max-w-md mx-auto text-center">
            <h1 class="text-4xl font-black tracking-tighter italic text-yellow-300">VEGGY MART</h1>
            <p class="text-[12px] font-bold uppercase tracking-[3px] mt-1 text-white/90">Premium Farm Fresh Service</p>
        </div>
    </header>

    <div id="product-list" class="p-4 grid grid-cols-1 gap-6 max-w-md mx-auto mt-4">
        </div>

    <div id="orderModal" class="fixed inset-0 bg-black/60 z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-[30px] p-8 shadow-2xl">
            <h2 class="text-2xl font-black text-green-800 mb-4 text-center">डिलिव्हरी तपशील</h2>
            <div class="space-y-4">
                <input type="text" id="custName" placeholder="तुमचे पूर्ण नाव" class="w-full p-4 bg-gray-100 rounded-2xl border-none focus:ring-2 focus:ring-green-500 font-bold">
                <input type="tel" id="custMobile" placeholder="मोबाईल नंबर" class="w-full p-4 bg-gray-100 rounded-2xl border-none focus:ring-2 focus:ring-green-500 font-bold">
                <textarea id="custAddr" placeholder="पूर्ण पत्ता (घर नंबर, गल्ली, एरिया)" class="w-full p-4 bg-gray-100 rounded-2xl border-none focus:ring-2 focus:ring-green-500 font-bold h-24"></textarea>
                <button onclick="confirmOrder()" class="w-full bg-green-600 text-white py-4 rounded-2xl font-black text-xl shadow-lg">ऑर्डर कन्फर्म करा</button>
                <button onclick="closeModal()" class="w-full text-gray-400 font-bold py-2">रद्द करा</button>
            </div>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-white p-6 shadow-[0_-20px_40px_rgba(0,0,0,0.1)] rounded-t-[45px] z-[60] border-t border-gray-100">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div>
                <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">Total Bill</p>
                <p id="total-price" class="text-4xl font-black text-green-700 leading-none">₹0</p>
            </div>
            <button onclick="openModal()" class="bg-green-600 hover:bg-green-700 text-white px-10 py-5 rounded-[25px] font-black text-lg shadow-xl active:scale-95 transition-all">
                ऑर्डर द्या 🛍️
            </button>
        </div>
    </div>

    <script>
        const products = [
            { id: 1, name: "टोमॅटो", price: 40, unit: "किलो", img: "https://images.unsplash.com/photo-1546473427-e1bc63ac370b?auto=format&fit=crop&w=300&q=80" },
            { id: 2, name: "कांदा", price: 30, unit: "किलो", img: "https://images.unsplash.com/photo-1508747703725-719777637510?auto=format&fit=crop&w=300&q=80" },
            { id: 3, name: "बटाटा", price: 35, unit: "किलो", img: "https://images.unsplash.com/photo-1518977676601-b53f02bad67b?auto=format&fit=crop&w=300&q=80" },
            { id: 4, name: "भेंडी (Fresh Okra)", price: 60, unit: "किलो", img: "https://images.unsplash.com/photo-1626132647523-66f5bf380027?auto=format&fit=crop&w=300&q=80" },
            { id: 5, name: "मेथी जुडी", price: 10, unit: "जुडी", img: "https://images.unsplash.com/photo-1589135353523-ba371454648d?auto=format&fit=crop&w=300&q=80" },
            { id: 6, name: "कोथिंबीर जुडी", price: 10, unit: "जुडी", img: "https://images.unsplash.com/photo-1588874134743-690278707639?auto=format&fit=crop&w=300&q=80" },
            { id: 7, name: "हिरवी मिरची", price: 40, unit: "किलो", img: "https://images.unsplash.com/photo-1588166524941-3bf61a7c41eb?auto=format&fit=crop&w=300&q=80" },
            { id: 8, name: "लिंबू (Fresh Lemon)", price: 5, unit: "नग", img: "https://images.unsplash.com/photo-1590505682696-4c5ef1596798?auto=format&fit=crop&w=300&q=80" }
        ];

        let cart = {};

        function render() {
            const list = document.getElementById('product-list');
            list.innerHTML = products.map(p => `
                <div class="bg-white rounded-[35px] overflow-hidden shadow-sm border border-gray-100 flex flex-col">
                    <img src="${p.img}" class="h-40 w-full object-cover" alt="${p.name}">
                    <div class="p-5 flex justify-between items-center">
                        <div>
                            <h3 class="text-xl font-black text-gray-800">${p.name}</h3>
                            <p class="text-green-600 font-bold text-sm">₹${p.price} / ${p.unit}</p>
                        </div>
                        <div class="text-right">
                            <p id="qty-label-${p.id}" class="text-xs font-bold text-gray-400 italic">0 निवडले</p>
                        </div>
                    </div>
                    <div class="px-5 pb-5 grid grid-cols-3 gap-2">
                        <button onclick="addToCart(${p.id}, 0.25, 'पावशेर')" class="bg-gray-100 py-3 rounded-xl text-[11px] font-bold hover:bg-green-100 transition">पावशेर</button>
                        <button onclick="addToCart(${p.id}, 0.5, 'अर्धा किलो')" class="bg-gray-100 py-3 rounded-xl text-[11px] font-bold hover:bg-green-100 transition">अर्धा किलो</button>
                        <button onclick="addToCart(${p.id}, 1, 'एक किलो')" class="bg-green-600 text-white py-3 rounded-xl text-[11px] font-bold shadow-md hover:bg-green-700 transition">एक किलो</button>
                    </div>
                </div>
            `).join('');
        }

        function addToCart(id, qty, label) {
            const p = products.find(x => x.id === id);
            cart[id] = { name: p.name, qty: qty, label: label, price: Math.round(p.price * qty) };
            document.getElementById(`qty-label-${id}`).innerText = label;
            document.getElementById(`qty-label-${id}`).classList.add('text-green-600');
            updateTotal();
        }

        function updateTotal() {
            let t = 0;
            for(let k in cart) t += cart[k].price;
            document.getElementById('total-price').innerText = "₹" + t;
        }

        function openModal() {
            if(document.getElementById('total-price').innerText === "₹0") return alert("आधी भाजी निवडा!");
            document.getElementById('orderModal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('orderModal').classList.add('hidden');
        }

        function confirmOrder() {
            const n = document.getElementById('custName').value;
            const m = document.getElementById('custMobile').value;
            const a = document.getElementById('custAddr').value;

            if(!n || !m || !a) return alert("कृपया सर्व माहिती भरा!");

            let msg = `*🥦 VEGGY MART - नवीन ऑर्डर 🥦*%0A`;
            msg += `-------------------------------%0A`;
            msg += `*ग्राहक:* ${n}%0A`;
            msg += `*मोबाईल:* ${m}%0A`;
            msg += `*पत्ता:* ${a}%0A`;
            msg += `-------------------------------%0A*ऑर्डर:*%0A`;
            
            for(let id in cart) {
                msg += `✅ ${cart[id].name} (${cart[id].label}) - ₹${cart[id].price}%0A`;
            }
            
            msg += `-------------------------------%0A`;
            msg += `*एकूण रक्कम: ${document.getElementById('total-price').innerText}*%0A`;
            msg += `_पैसे भाजी मिळाल्यावर द्या (COD)_`;

            window.open(`https://wa.me/917385533059?text=${msg}`);
            closeModal();
        }

        render();
    </script>
</body>
                  </html>
