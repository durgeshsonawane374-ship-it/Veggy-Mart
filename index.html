<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veggy Mart - ताजी भाजी</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Hind', sans-serif; background-color: #f0fdf4; }
        .product-card { transition: all 0.3s ease; }
    </style>
</head>
<body class="pb-44">

    <header class="bg-green-700 text-white p-8 shadow-2xl rounded-b-[50px] sticky top-0 z-50 border-b-4 border-yellow-400">
        <div class="max-w-md mx-auto text-center">
            <h1 class="text-4xl font-black italic text-yellow-300">VEGGY MART</h1>
            <p class="text-xs font-bold mt-1">थेट शेतातून तुमच्या किचनपर्यंत!</p>
        </div>
    </header>

    <div id="product-list" class="p-4 grid grid-cols-1 gap-6 max-w-md mx-auto mt-4">
        </div>

    <div id="orderModal" class="fixed inset-0 bg-black/70 z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-[35px] p-6 shadow-2xl">
            <h2 class="text-2xl font-black text-green-800 mb-4 text-center">डिलिव्हरी माहिती</h2>
            <div class="space-y-3">
                <input type="text" id="custName" placeholder="तुमचे नाव" class="w-full p-4 bg-gray-50 rounded-2xl border-none font-bold">
                <input type="tel" id="custMobile" placeholder="मोबाईल नंबर" class="w-full p-4 bg-gray-50 rounded-2xl border-none font-bold">
                <textarea id="custAddr" placeholder="पूर्ण पत्ता" class="w-full p-4 bg-gray-50 rounded-2xl border-none font-bold h-20"></textarea>
                <button onclick="confirmOrder()" class="w-full bg-green-600 text-white py-4 rounded-2xl font-black text-xl">ऑर्डर कन्फर्म करा</button>
                <button onclick="closeModal()" class="w-full text-gray-400 font-bold py-1">रद्द करा</button>
            </div>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-white p-6 shadow-2xl rounded-t-[40px] z-[60] border-t border-green-50">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div>
                <p class="text-[10px] text-gray-400 font-black uppercase">एकूण बिल</p>
                <p id="total-price" class="text-4xl font-black text-green-700 leading-none">₹0</p>
            </div>
            <button onclick="openModal()" class="bg-green-600 text-white px-8 py-4 rounded-[25px] font-black text-lg shadow-lg active:scale-90 transition-all">
                ऑर्डर द्या 🛒
            </button>
        </div>
    </div>

    <script>
        // येथे मी सर्व इमेजेसच्या परफेक्ट लिंक्स टाकल्या आहेत
        const products = [
            { id: 1, name: "टोमॅटो", price: 40, unit: "किलो", img: "https://images.unsplash.com/photo-1546473427-e1bc63ac370b?w=500" },
            { id: 2, name: "कांदा", price: 30, unit: "किलो", img: "https://images.unsplash.com/photo-1508747703725-719777637510?w=500" },
            { id: 3, name: "बटाटा", price: 35, unit: "किलो", img: "https://images.unsplash.com/photo-1518977676601-b53f02bad67b?w=500" },
            { id: 4, name: "भेंडी", price: 60, unit: "किलो", img: "https://images.unsplash.com/photo-1626132647523-66f5bf380027?w=500" },
            { id: 5, name: "वांगी", price: 40, unit: "किलो", img: "https://images.unsplash.com/photo-1590333746438-d81ff1551c24?w=500" },
            { id: 6, name: "हिरवी मिरची", price: 40, unit: "किलो", img: "https://images.unsplash.com/photo-1588166524941-3bf61a7c41eb?w=500" },
            { id: 7, name: "मेथी जुडी", price: 10, unit: "जुडी", img: "https://images.unsplash.com/photo-1589135353523-ba371454648d?w=500" },
            { id: 8, name: "कोथिंबीर", price: 10, unit: "जुडी", img: "https://images.unsplash.com/photo-1588874134743-690278707639?w=500" },
            { id: 9, name: "लिंबू", price: 5, unit: "नग", img: "https://images.unsplash.com/photo-1590505682696-4c5ef1596798?w=500" }
        ];

        let cart = {};

        function render() {
            const list = document.getElementById('product-list');
            list.innerHTML = products.map(p => `
                <div class="product-card bg-white rounded-[35px] overflow-hidden shadow-sm border border-gray-100">
                    <img src="${p.img}" class="h-44 w-full object-cover" alt="${p.name}">
                    <div class="p-5">
                        <div class="flex justify-between items-center mb-4">
                            <div>
                                <h3 class="text-xl font-black text-gray-800">${p.name}</h3>
                                <p class="text-green-600 font-bold">₹${p.price} / ${p.unit}</p>
                            </div>
                            <span id="qty-label-${p.id}" class="text-[10px] font-bold text-gray-400 bg-gray-100 px-3 py-1 rounded-full">0 निवडले</span>
                        </div>
                        <div class="grid grid-cols-3 gap-2">
                            <button onclick="addToCart(${p.id}, 0.25, 'पावशेर')" class="bg-gray-50 py-3 rounded-xl text-xs font-bold border border-gray-100">पावशेर</button>
                            <button onclick="addToCart(${p.id}, 0.5, 'अर्धा किलो')" class="bg-gray-50 py-3 rounded-xl text-xs font-bold border border-gray-100">अर्धा किलो</button>
                            <button onclick="addToCart(${p.id}, 1, 'एक किलो')" class="bg-green-600 text-white py-3 rounded-xl text-xs font-bold shadow-md">एक किलो</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function addToCart(id, qty, label) {
            const p = products.find(x => x.id === id);
            cart[id] = { name: p.name, qty: qty, label: label, price: Math.round(p.price * qty) };
            const labelEl = document.getElementById(`qty-label-${id}`);
            labelEl.innerText = label;
            labelEl.classList.add('text-green-600', 'bg-green-50');
            updateTotal();
        }

        function updateTotal() {
            let t = 0;
            for(let k in cart) t += cart[k].price;
            document.getElementById('total-price').innerText = "₹" + t;
        }

        function openModal() {
            if(document.getElementById('total-price').innerText === "₹0") return alert("कृपया भाजी निवडा!");
            document.getElementById('orderModal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('orderModal').classList.add('hidden');
        }

        function confirmOrder() {
            const n = document.getElementById('custName').value;
            const m = document.getElementById('custMobile').value;
            const a = document.getElementById('custAddr').value;
            if(!n || !m || !a) return alert("कृपया माहिती भरा!");

            let msg = `*🥦 VEGGY MART ORDER 🥦*%0A-----------------------%0A*ग्राहक:* ${n}%0A*मोबाईल:* ${m}%0A*पत्ता:* ${a}%0A-----------------------%0A`;
            for(let id in cart) {
                msg += `✅ ${cart[id].name} (${cart[id].label}) - ₹${cart[id].price}%0A`;
            }
            msg += `-----------------------%0A*एकूण बिल: ${document.getElementById('total-price').innerText}*%0A_COD (रोख पैसे द्या)_`;
            window.open(`https://wa.me/917385533059?text=${msg}`);
        }

        render();
    </script>
</body>
  </html>
