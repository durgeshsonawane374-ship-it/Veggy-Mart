<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veggy Mart - ताजी भाजी</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Hind', sans-serif; background-color: #f0fdf4; }
        .product-card { transition: all 0.3s ease; }
        .product-card:hover { transform: translateY(-5px); }
    </style>
</head>
<body class="pb-44">

    <header class="bg-green-700 text-white p-8 shadow-2xl rounded-b-[60px] sticky top-0 z-50 border-b-8 border-yellow-400">
        <div class="max-w-md mx-auto text-center">
            <h1 class="text-5xl font-black italic tracking-tighter text-yellow-300 drop-shadow-md">VEGGY MART</h1>
            <p class="text-sm font-bold uppercase tracking-widest mt-2">थेट शेतातून तुमच्या किचनपर्यंत!</p>
        </div>
    </header>

    <div id="product-list" class="p-4 grid grid-cols-1 gap-8 max-w-md mx-auto mt-6">
        </div>

    <div id="orderModal" class="fixed inset-0 bg-black/70 z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-[40px] p-8 shadow-2xl animate-bounce-in">
            <h2 class="text-3xl font-black text-green-800 mb-6 text-center underline decoration-yellow-400">डिलिव्हरी माहिती</h2>
            <div class="space-y-4">
                <input type="text" id="custName" placeholder="तुमचे पूर्ण नाव" class="w-full p-4 bg-gray-50 rounded-2xl border-2 border-green-100 focus:border-green-500 outline-none font-bold">
                <input type="tel" id="custMobile" placeholder="मोबाईल नंबर" class="w-full p-4 bg-gray-50 rounded-2xl border-2 border-green-100 focus:border-green-500 outline-none font-bold">
                <textarea id="custAddr" placeholder="पूर्ण पत्ता (घर नं, गल्ली, एरिया)" class="w-full p-4 bg-gray-50 rounded-2xl border-2 border-green-100 focus:border-green-500 outline-none font-bold h-24"></textarea>
                <button onclick="confirmOrder()" class="w-full bg-green-600 text-white py-5 rounded-3xl font-black text-2xl shadow-xl hover:bg-green-700 active:scale-95 transition">ऑर्डर कन्फर्म करा ✅</button>
                <button onclick="closeModal()" class="w-full text-gray-400 font-bold py-2">रद्द करा</button>
            </div>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-white p-8 shadow-[0_-25px_50px_rgba(0,0,0,0.15)] rounded-t-[55px] z-[60] border-t-2 border-green-50">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div>
                <p class="text-xs text-gray-400 font-black uppercase tracking-tighter">एकूण बिल (Total Bill)</p>
                <p id="total-price" class="text-5xl font-black text-green-700 leading-none">₹0</p>
            </div>
            <button onclick="openModal()" class="bg-green-600 hover:bg-green-700 text-white px-10 py-6 rounded-[30px] font-black text-xl shadow-2xl active:scale-90 transition-all border-b-4 border-green-900">
                ऑर्डर द्या 🛒
            </button>
        </div>
    </div>

    <script>
        const products = [
            { id: 1, name: "टोमॅटो", price: 40, unit: "किलो", img: "https://i.ibb.co/XfXkXfX/tomato.jpg" }, 
            { id: 2, name: "कांदा", price: 30, unit: "किलो", img: "https://images.unsplash.com/photo-1508747703725-719777637510?w=500" },
            { id: 3, name: "बटाटा", price: 35, unit: "किलो", img: "https://i.ibb.co/YyYkYyY/potato.jpg" },
            { id: 4, name: "भेंडी", price: 60, unit: "किलो", img: "https://i.ibb.co/ZzZkZzZ/okra.jpg" },
            { id: 5, name: "हिरवी मिरची", price: 40, unit: "किलो", img: "https://i.ibb.co/WwWkWwW/chili.jpg" },
            { id: 6, name: "वांगी", price: 40, unit: "किलो", img: "https://i.ibb.co/VvVkVvV/eggplant.jpg" },
            { id: 7, name: "मेथी जुडी", price: 10, unit: "जुडी", img: "https://images.unsplash.com/photo-1589135353523-ba371454648d?w=500" },
            { id: 8, name: "कोथिंबीर", price: 10, unit: "जुडी", img: "https://images.unsplash.com/photo-1588874134743-690278707639?w=500" },
            { id: 9, name: "लिंबू", price: 5, unit: "नग", img: "https://images.unsplash.com/photo-1590505682696-4c5ef1596798?w=500" }
        ];

        let cart = {};

        function render() {
            const list = document.getElementById('product-list');
            list.innerHTML = products.map(p => `
                <div class="product-card bg-white rounded-[45px] overflow-hidden shadow-xl border border-green-50 flex flex-col">
                    <div class="h-56 overflow-hidden">
                        <img src="${p.img}" class="h-full w-full object-cover scale-110" alt="${p.name}">
                    </div>
                    <div class="p-6">
                        <div class="flex justify-between items-center mb-4">
                            <div>
                                <h3 class="text-2xl font-black text-gray-800">${p.name}</h3>
                                <p class="text-green-600 font-bold">₹${p.price} / ${p.unit}</p>
                            </div>
                            <span id="qty-label-${p.id}" class="bg-gray-100 text-gray-400 px-4 py-2 rounded-2xl text-xs font-black uppercase">0 निवडले</span>
                        </div>
                        <div class="grid grid-cols-3 gap-3">
                            <button onclick="addToCart(${p.id}, 0.25, 'पावशेर')" class="bg-gray-50 py-4 rounded-2xl text-xs font-black hover:bg-green-100 border border-gray-100">पावशेर</button>
                            <button onclick="addToCart(${p.id}, 0.5, 'अर्धा किलो')" class="bg-gray-50 py-4 rounded-2xl text-xs font-black hover:bg-green-100 border border-gray-100">अर्धा किलो</button>
                            <button onclick="addToCart(${p.id}, 1, 'एक किलो')" class="bg-green-600 text-white py-4 rounded-2xl text-xs font-black shadow-lg hover:bg-green-700">एक किलो</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function addToCart(id, qty, label) {
            const p = products.find(x => x.id === id);
            cart[id] = { name: p.name, qty: qty, label: label, price: Math.round(p.price * qty) };
            const labelEl = document.getElementById(`qty-label-${id}`);
            labelEl.innerText = label;
            labelEl.classList.replace('bg-gray-100', 'bg-green-600');
            labelEl.classList.replace('text-gray-400', 'text-white');
            updateTotal();
        }

        function updateTotal() {
            let t = 0;
            for(let k in cart) t += cart[k].price;
            document.getElementById('total-price').innerText = "₹" + t;
        }

        function openModal() {
            if(document.getElementById('total-price').innerText === "₹0") return alert("कृपया किमान एक भाजी निवडा!");
            document.getElementById('orderModal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('orderModal').classList.add('hidden');
        }

        function confirmOrder() {
            const n = document.getElementById('custName').value;
            const m = document.getElementById('custMobile').value;
            const a = document.getElementById('custAddr').value;

            if(!n || !m || !a) return alert("कृपया सर्व माहिती भरा!");

            let msg = `*🥦 VEGGY MART - नवीन ऑर्डर 🥦*%0A`;
            msg += `-------------------------------%0A`;
            msg += `*ग्राहक:* ${n}%0A`;
            msg += `*मोबाईल:* ${m}%0A`;
            msg += `*पत्ता:* ${a}%0A`;
            msg += `-------------------------------%0A*ऑर्डर:*%0A`;
            
            for(let id in cart) {
                msg += `✅ ${cart[id].name} (${cart[id].label}) - ₹${cart[id].price}%0A`;
            }
            
            msg += `-------------------------------%0A`;
            msg += `*एकूण रक्कम: ${document.getElementById('total-price').innerText}*%0A`;
            msg += `_पैसे डिलिव्हरीच्या वेळी द्या_`;

            window.open(`https://wa.me/917385533059?text=${msg}`);
            closeModal();
        }

        render();
    </script>
</body>
  </html>
