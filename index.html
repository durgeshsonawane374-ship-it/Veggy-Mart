<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veggy Mart - ताजी भाजी</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Hind', sans-serif; background-color: #f9fafb; }
        .veg-card { border-radius: 30px; overflow: hidden; background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .btn-shadow { box-shadow: 0 4px 0 #15803d; }
        .btn-shadow:active { box-shadow: 0 0 0 #15803d; transform: translateY(4px); }
    </style>
</head>
<body class="pb-44">

    <header class="bg-green-600 text-white p-6 sticky top-0 z-50 rounded-b-[40px] shadow-lg text-center border-b-4 border-yellow-400">
        <h1 class="text-3xl font-black italic tracking-tighter text-yellow-300">VEGGY MART</h1>
        <p class="text-[10px] font-bold uppercase tracking-widest mt-1">ताजी भाजी, थेट तुमच्या दारी!</p>
    </header>

    <div id="products" class="p-4 space-y-6 max-w-md mx-auto"></div>

    <!-- Order Modal -->
    <div id="orderModal" class="fixed inset-0 bg-black/70 z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-[40px] p-8 shadow-2xl">
            <h2 class="text-2xl font-black text-green-800 mb-4 text-center">डिलिव्हरी पत्ता</h2>
            <div class="space-y-4">
                <input type="text" id="custName" placeholder="तुमचे नाव" class="w-full p-4 bg-gray-100 rounded-2xl outline-none font-bold">
                <input type="tel" id="custMobile" placeholder="मोबाईल नंबर" class="w-full p-4 bg-gray-100 rounded-2xl outline-none font-bold">
                <textarea id="custAddr" placeholder="पूर्ण पत्ता" class="w-full p-4 bg-gray-100 rounded-2xl outline-none font-bold h-24"></textarea>
                <button onclick="confirmOrder()" class="w-full bg-green-600 text-white py-4 rounded-2xl font-black text-xl btn-shadow">ऑर्डर पूर्ण करा ✅</button>
                <button onclick="closeModal()" class="w-full text-gray-400 font-bold py-2 text-center text-sm">रद्द करा</button>
            </div>
        </div>
    </div>

    <!-- Bill Footer -->
    <div class="fixed bottom-0 left-0 right-0 bg-white p-6 shadow-2xl rounded-t-[45px] z-[60] border-t border-gray-100">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div>
                <p class="text-[10px] text-gray-400 font-bold uppercase">Total Bill</p>
                <p id="total-price" class="text-4xl font-black text-green-700 leading-none">₹0</p>
            </div>
            <button onclick="openModal()" class="bg-green-600 text-white px-10 py-5 rounded-[25px] font-black text-lg btn-shadow">
                ऑर्डर द्या 🛒
            </button>
        </div>
    </div>

    <script>
        const products = [
            { id: 1, name: "टोमॅटो", price: 40, unit: "किलो", img: "https://images.unsplash.com/photo-1546473427-e1bc63ac370b?w=400", type: "weight" },
            { id: 2, name: "कांदा", price: 30, unit: "किलो", img: "https://images.unsplash.com/photo-1508747703725-719777637510?w=400", type: "weight" },
            { id: 3, name: "बटाटा", price: 35, unit: "किलो", img: "https://images.unsplash.com/photo-1518977676601-b53f02bad67b?w=400", type: "weight" },
            { id: 4, name: "मेथी", price: 10, unit: "जुडी", img: "https://images.unsplash.com/photo-1589135353523-ba371454648d?w=400", type: "judi" },
            { id: 5, name: "कोथिंबीर", price: 10, unit: "जुडी", img: "https://images.unsplash.com/photo-1588874134743-690278707639?w=400", type: "judi" },
            { id: 6, name: "हिरवी मिरची", price: 50, unit: "किलो", img: "https://images.unsplash.com/photo-1588166524941-3bf61a7c41eb?w=400", type: "weight" },
            { id: 7, name: "वांगी", price: 40, unit: "किलो", img: "https://images.unsplash.com/photo-1590333746438-d81ff1551c24?w=400", type: "weight" } ,
          { id: 8, name: "भेंडी", price: 30, unit: "किलो",
        ];

        let cart = {};

        function render() {
            const list = document.getElementById('products');
            list.innerHTML = products.map(p => {
                let buttons = "";
                if(p.type === "judi") {
                    buttons = `
                        <button onclick="addToCart(${p.id}, 1, '1 जुडी')" class="bg-gray-100 py-3 rounded-xl text-[10px] font-bold border border-gray-100">१ जुडी</button>
                        <button onclick="addToCart(${p.id}, 2, '2 जुडी')" class="bg-gray-100 py-3 rounded-xl text-[10px] font-bold border border-gray-100">२ जुडी</button>
                        <button onclick="addToCart(${p.id}, 3, '3 जुडी')" class="bg-green-600 text-white py-3 rounded-xl text-[10px] font-bold btn-shadow">३ जुडी</button>
                    `;
                } else {
                    buttons = `
                        <button onclick="addToCart(${p.id}, 0.25, 'पावशेर')" class="bg-gray-100 py-3 rounded-xl text-[10px] font-bold border border-gray-100">पावशेर</button>
                        <button onclick="addToCart(${p.id}, 0.5, 'अर्धा किलो')" class="bg-gray-100 py-3 rounded-xl text-[10px] font-bold border border-gray-100">अर्धा किलो</button>
                        <button onclick="addToCart(${p.id}, 1, 'एक किलो')" class="bg-green-600 text-white py-3 rounded-xl text-[10px] font-bold btn-shadow">एक किलो</button>
                    `;
                }

                return `
                <div class="veg-card">
                    <img src="${p.img}" class="h-52 w-full object-cover">
                    <div class="p-5">
                        <div class="flex justify-between items-center mb-4">
                            <div>
                                <h3 class="text-xl font-bold text-gray-800">${p.name}</h3>
                                <p class="text-green-600 font-bold">₹${p.price} / ${p.unit}</p>
                            </div>
                            <span id="label-${p.id}" class="text-[10px] font-bold text-gray-400 bg-gray-50 px-3 py-1 rounded-full uppercase">निवडा</span>
                        </div>
                        <div class="grid grid-cols-3 gap-2">${buttons}</div>
                    </div>
                </div>`;
            }).join('');
        }

        function addToCart(id, qty, label) {
            const p = products.find(x => x.id === id);
            cart[id] = { name: p.name, qty: qty, label: label, price: Math.round(p.price * qty) };
            const el = document.getElementById(`label-${id}`);
            el.innerText = label;
            el.classList.replace('text-gray-400', 'text-green-600');
            updateTotal();
        }

        function updateTotal() {
            let t = 0;
            for(let k in cart) t += cart[k].price;
            document.getElementById('total-price').innerText = "₹" + t;
        }

        function openModal() {
            if(document.getElementById('total-price').innerText === "₹0") return alert("कृपया भाजी निवडा!");
            document.getElementById('orderModal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('orderModal').classList.add('hidden'); }

        function confirmOrder() {
            const n = document.getElementById('custName').value;
            const m = document.getElementById('custMobile').value;
            const a = document.getElementById('custAddr').value;
            if(!n || !m || !a) return alert("सर्व माहिती भरा!");

            let msg = `*🥦 VEGGY MART ORDER 🥦*%0A-----------------------%0A*ग्राहक:* ${n}%0A*मोबाईल:* ${m}%0A*पत्ता:* ${a}%0A-----------------------%0A`;
            for(let id in cart) { msg += `✅ ${cart[id].name} (${cart[id].label}) - ₹${cart[id].price}%0A`; }
            msg += `-----------------------%0A*एकूण बिल: ${document.getElementById('total-price').innerText}*%0A_पैसे आल्यावर द्या (COD)_`;
            window.open(`https://wa.me/917385533059?text=${msg}`);
            closeModal();
        }

        render();
    </script>
</body>
              </html>
