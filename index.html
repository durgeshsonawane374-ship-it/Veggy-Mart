<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veggy Mart - ताजी भाजी</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-green-50 pb-28 font-sans">
    <header class="bg-green-600 text-white p-5 text-center shadow-lg sticky top-0 z-50">
        <h1 class="text-3xl font-black italic tracking-wider">VEGGY MART</h1>
        <p class="text-xs opacity-90 mt-1">थेट शेतातून तुमच्या किचनपर्यंत!</p>
    </header>

    <div class="p-4 space-y-4 max-w-md mx-auto">
        <div class="bg-white p-4 rounded-2xl shadow-md border-l-8 border-red-500 flex justify-between items-center">
            <div><h3 class="text-xl font-bold">टोमॅटो</h3><p class="text-red-600 font-bold">₹४०/किलो</p></div>
            <div class="flex flex-col gap-1">
                <button onclick="add('टोमॅटो', 10, 'पावशेर')" class="bg-green-100 text-green-800 px-3 py-1 rounded text-xs font-bold border border-green-200 shadow-sm">पावशेर - ₹१०</button>
                <button onclick="add('टोमॅटो', 40, '१ किलो')" class="bg-green-600 text-white px-3 py-1 rounded text-xs font-bold shadow">१ किलो - ₹४०</button>
            </div>
        </div>

        <div class="bg-white p-4 rounded-2xl shadow-md border-l-8 border-pink-500 flex justify-between items-center">
            <div><h3 class="text-xl font-bold">कांदा</h3><p class="text-pink-600 font-bold">₹३०/किलो</p></div>
            <div class="flex flex-col gap-1">
                <button onclick="add('कांदा', 15, 'अर्धा किलो')" class="bg-green-100 text-green-800 px-3 py-1 rounded text-xs font-bold border border-green-200 shadow-sm">५००ग्रॅम - ₹१५</button>
                <button onclick="add('कांदा', 30, '१ किलो')" class="bg-green-600 text-white px-3 py-1 rounded text-xs font-bold shadow">१ किलो - ₹३०</button>
            </div>
        </div>

        <div class="bg-white p-4 rounded-2xl shadow-md border-l-8 border-yellow-600 flex justify-between items-center">
            <div><h3 class="text-xl font-bold">बटाटा</h3><p class="text-yellow-700 font-bold">₹३०/किलो</p></div>
            <div class="flex flex-col gap-1">
                <button onclick="add('बटाटा', 15, 'अर्धा किलो')" class="bg-green-100 text-green-800 px-3 py-1 rounded text-xs font-bold border border-green-200 shadow-sm">५००ग्रॅम - ₹१५</button>
                <button onclick="add('बटाटा', 30, '१ किलो')" class="bg-green-600 text-white px-3 py-1 rounded text-xs font-bold shadow">१ किलो - ₹३०</button>
            </div>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-white p-5 border-t-4 border-green-600 shadow-2xl flex justify-between items-center">
        <div>
            <p class="text-xs text-gray-400 uppercase font-bold tracking-widest">एकूण बिल</p>
            <p id="total" class="text-3xl font-black text-green-700 leading-none">₹०</p>
        </div>
        <button onclick="order()" class="bg-green-600 text-white px-8 py-4 rounded-2xl font-black text-lg shadow-lg active:scale-95 transition-all">ऑर्डर द्या (WhatsApp)</button>
    </div>

    <script>
        let cart = {};
        function add(n, p, w) {
            cart[n] = { p, w };
            let t = 0; Object.values(cart).forEach(i => t += i.p);
            document.getElementById('total').innerText = "₹" + t;
        }
        function order() {
            if(Object.keys(cart).length === 0) return alert("आधी भाजी निवडा!");
            let n = prompt("तुमचे नाव?");
            let a = prompt("तुमचा पूर्ण पत्ता?");
            if(!n || !a) return alert("डिलिव्हरीसाठी नाव आणि पत्ता गरजेचा आहे!");
            let msg = `*VEGGY MART - नवीन ऑर्डर*%0A--------------------%0A*नाव:* ${n}%0A*पत्ता:* ${a}%0A--------------------%0A*भाज्या:*%0A`;
            for(let k in cart) { msg += `- ${k} (${cart[k].w}) : ₹${cart[k].p}%0A`; }
            msg += `--------------------%0A*एकूण बिल: ${document.getElementById('total').innerText}*%0A_पैसे भाजी मिळाल्यावर द्या (COD)_`;
            window.open(`https://wa.me/917385533059?text=${msg}`);
        }
    </script>
</body>
              </html>
