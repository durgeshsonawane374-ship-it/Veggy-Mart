<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veggy Mart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Hind', sans-serif; background-color: #f0f2f5; margin: 0; padding: 0; }
        .veg-card { border-radius: 30px; background: white; box-shadow: 0 8px 20px rgba(0,0,0,0.1); margin-bottom: 20px; overflow: hidden; }
        .emoji-box { height: 180px; background: #f9f9f9; overflow: hidden; }
        .emoji-box img { width: 100%; height: 100%; object-fit: cover; }
        .btn-shadow { box-shadow: 0 4px 0 #15803d; transition: all 0.1s; }
        .btn-shadow:active { transform: translateY(4px); box-shadow: 0 0 0 #15803d; }
    </style>
</head>
<body class="pb-44">

    <header class="bg-green-600 text-white p-6 text-center rounded-b-[40px]">
        <h1 class="text-4xl font-black italic text-yellow-300">VEGGY MART</h1>
        <p class="text-sm font-bold mt-1">ताजी भाजी, थेट तुमच्या दारी!</p>
    </header>

    <div id="products" class="p-4 max-w-md mx-auto"></div>

    <!-- Bottom Bar -->
    <div class="fixed bottom-0 left-0 right-0 bg-white p-6 shadow-2xl rounded-t-[40px] border-t">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div>
                <p class="text-xs text-gray-500">Total Bill</p>
                <p id="total-price" class="text-4xl font-black text-green-700">₹0</p>
            </div>
            <button onclick="openModal()" 
                    class="bg-green-600 text-white px-10 py-4 rounded-2xl font-black text-lg btn-shadow">
                ऑर्डर द्या 🛒
            </button>
        </div>
    </div>

    <!-- Modal -->
    <div id="orderModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center p-4 z-50">
        <div class="bg-white w-full max-w-sm rounded-[40px] p-8">
            <h2 class="text-2xl font-black text-center mb-6">पत्ता भरा</h2>
            <input id="custName" type="text" placeholder="तुमचे नाव" class="w-full p-4 mb-3 bg-gray-100 rounded-2xl">
            <input id="custMobile" type="tel" placeholder="मोबाईल नंबर" class="w-full p-4 mb-3 bg-gray-100 rounded-2xl">
            <textarea id="custAddr" placeholder="पूर्ण पत्ता" class="w-full p-4 mb-4 bg-gray-100 rounded-2xl h-28"></textarea>
            
            <button onclick="confirmOrder()" class="w-full bg-green-600 text-white py-4 rounded-2xl font-black mb-2">Order Confirm ✅</button>
            <button onclick="closeModal()" class="w-full text-gray-500 py-3">रद्द करा</button>
        </div>
    </div>

    <script>
        const products = [
            { id: 1, name: "टोमॅटो", price: 40, unit: "किलो", image: "https://picsum.photos/id/1080/600/400", type: "weight" },
            { id: 2, name: "कांदा", price: 30, unit: "किलो", image: "https://picsum.photos/id/292/600/400", type: "weight" },
            { id: 3, name: "बटाटा", price: 35, unit: "किलो", image: "https://picsum.photos/id/312/600/400", type: "weight" },
            { id: 4, name: "भेंडी", price: 30, unit: "किलो", image: "https://picsum.photos/id/669/600/400", type: "weight" },
            { id: 5, name: "मेथी", price: 10, unit: "जुडी", image: "https://picsum.photos/id/1080/600/400", type: "judi" },
            { id: 6, name: "कोथिंबीर", price: 10, unit: "जुडी", image: "https://picsum.photos/id/292/600/400", type: "judi" },
            { id: 7, name: "हिरवी मिरची", price: 40, unit: "किलो", image: "https://picsum.photos/id/669/600/400", type: "weight" },
            { id: 8, name: "वांगी", price: 40, unit: "किलो", image: "https://picsum.photos/id/312/600/400", type: "weight" }
        ];

        let cart = {};

        function render() {
            const container = document.getElementById('products');
            container.innerHTML = products.map(p => {
                const options = p.type === "judi" 
                    ? [['1 जुडी', 1], ['2 जुडी', 2], ['3 जुडी', 3]]
                    : [['पावशेर', 0.25], ['अर्धा किलो', 0.5], ['एक किलो', 1]];

                return `
                <div class="veg-card">
                    <div class="emoji-box">
                        <img src="\( {p.image}" alt=" \){p.name}">
                    </div>
                    <div class="p-5">
                        <div class="flex justify-between mb-4">
                            <div>
                                <h3 class="text-2xl font-black">${p.name}</h3>
                                <p class="text-green-600 font-bold">₹${p.price} / ${p.unit}</p>
                            </div>
                            <div class="text-right">
                                <span id="label-${p.id}" class="text-xs bg-gray-100 px-3 py-1 rounded-full">निवडा</span>
                                <button id="rm-\( {p.id}" onclick="remove( \){p.id})" class="hidden text-red-500 text-xs mt-2">काढून टाका ✖</button>
                            </div>
                        </div>
                        <div class="grid grid-cols-3 gap-2">
                            ${options.map(opt => 
                                `<button onclick="add(${p.id}, \( {opt[1]}, ' \){opt[0]}')" 
                                 class="py-3 text-sm font-bold bg-gray-50 hover:bg-green-50 border border-gray-200 rounded-xl">
                                    ${opt[0]}
                                 </button>`
                            ).join('')}
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function add(id, qty, label) {
            const p = products.find(x => x.id === id);
            cart[id] = {name: p.name, qty, label, price: Math.round(p.price * qty)};
            document.getElementById(`label-${id}`).textContent = label;
            document.getElementById(`label-${id}`).className = "text-xs bg-green-100 text-green-700 px-3 py-1 rounded-full font-bold";
            document.getElementById(`rm-${id}`).classList.remove('hidden');
            updateTotal();
        }

        function remove(id) {
            delete cart[id];
            document.getElementById(`label-${id}`).textContent = "निवडा";
            document.getElementById(`label-${id}`).className = "text-xs bg-gray-100 px-3 py-1 rounded-full";
            document.getElementById(`rm-${id}`).classList.add('hidden');
            updateTotal();
        }

        function updateTotal() {
            let total = Object.values(cart).reduce((sum, item) => sum + item.price, 0);
            document.getElementById('total-price').textContent = "₹" + total;
        }

        function openModal() {
            if (document.getElementById('total-price').textContent === "₹0") {
                alert("कृपया भाजी निवडा!");
                return;
            }
            document.getElementById('orderModal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('orderModal').classList.add('hidden');
        }

        function confirmOrder() {
            const name = document.getElementById('custName').value.trim();
            const mobile = document.getElementById('custMobile').value.trim();
            const addr = document.getElementById('custAddr').value.trim();

            if (!name || !mobile || !addr) {
                alert("सर्व माहिती भरा!");
                return;
            }

            alert("✅ ऑर्डर तयार! WhatsApp वर पाठवली जात आहे...");
            // WhatsApp code (तुमचा नंबर)
            // window.open(`https://wa.me/917385533059?text=...`);
        }

        // Load the page
        render();
    </script>
</body>
  </html>
