<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veggy Mart Pro - ताजी भाजी</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 pb-32 font-sans">
    <header class="bg-green-600 text-white p-6 text-center shadow-xl sticky top-0 z-50 rounded-b-3xl">
        <h1 class="text-3xl font-black italic tracking-tighter">VEGGY MART</h1>
        <div class="bg-white/20 inline-block px-3 py-1 rounded-full text-xs mt-2 font-bold tracking-widest uppercase">Premium Fresh Delivery</div>
    </header>

    <div id="product-list" class="p-4 grid grid-cols-1 gap-4 max-w-md mx-auto">
        </div>

    <div class="fixed bottom-0 left-0 right-0 bg-white p-6 border-t border-gray-200 shadow-[0_-10px_20px_rgba(0,0,0,0.1)] flex justify-between items-center rounded-t-3xl">
        <div class="flex flex-col">
            <span class="text-xs text-gray-400 font-bold uppercase tracking-widest">Total Amount</span>
            <span id="total" class="text-3xl font-black text-green-700 leading-none">₹0</span>
        </div>
        <button onclick="order()" class="bg-green-600 hover:bg-green-700 text-white px-8 py-4 rounded-2xl font-black text-lg shadow-lg active:scale-95 transition-all flex items-center gap-2">
            ORDER ON <i class="fab fa-whatsapp text-2xl"></i>
        </button>
    </div>

    <script>
        const products = [
            { id: 1, name: "टोमॅटो", price: 40, unit: "kg", color: "border-red-500", icon: "🍅" },
            { id: 2, name: "कांदा", price: 30, unit: "kg", color: "border-pink-400", icon: "🧅" },
            { id: 3, name: "बटाटा", price: 35, unit: "kg", color: "border-yellow-600", icon: "🥔" },
            { id: 4, name: "भेंडी", price: 60, unit: "kg", color: "border-green-500", icon: "🥦" },
            { id: 5, name: "कोबी", price: 30, unit: "नग", color: "border-green-300", icon: "🥬" }
        ];

        let cart = {};

        function renderProducts() {
            const list = document.getElementById('product-list');
            list.innerHTML = products.map(p => `
                <div class="bg-white p-5 rounded-3xl shadow-sm border-l-[10px] ${p.color} flex justify-between items-center transform transition hover:scale-[1.02]">
                    <div class="flex items-center gap-3">
                        <span class="text-3xl">${p.icon}</span>
                        <div>
                            <h3 class="text-xl font-extrabold text-gray-800">${p.name}</h3>
                            <p class="text-green-600 font-bold text-sm">₹${p.price} / ${p.unit}</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-3 bg-gray-100 p-1 rounded-xl">
                        <button onclick="updateQty(${p.id}, -0.25)" class="bg-white w-10 h-10 rounded-lg shadow-sm font-black text-xl text-red-500">-</button>
                        <span id="qty-${p.id}" class="w-16 text-center font-black text-gray-700">0 kg</span>
                        <button onclick="updateQty(${p.id}, 0.25)" class="bg-green-500 w-10 h-10 rounded-lg shadow-sm font-black text-xl text-white">+</button>
                    </div>
                </div>
            `).join('');
        }

        function updateQty(id, change) {
            if (!cart[id]) cart[id] = 0;
            cart[id] = Math.max(0, cart[id] + change);
            document.getElementById(`qty-${id}`).innerText = cart[id] > 0 ? cart[id] + " kg" : "0 kg";
            updateTotal();
        }

        function updateTotal() {
            let total = 0;
            for (let id in cart) {
                const product = products.find(p => p.id == id);
                total += cart[id] * product.price;
            }
            document.getElementById('total').innerText = "₹" + total;
        }

        function order() {
            let total = document.getElementById('total').innerText;
            if (total === "₹0") return alert("कृपया किमान एक भाजी निवडा!");
            
            let name = prompt("तुमचे नाव?");
            let address = prompt("तुमचा पूर्ण पत्ता?");
            if (!name || !address) return alert("ऑर्डरसाठी नाव आणि पत्ता आवश्यक आहे!");

            let msg = `*🥦 VEGGY MART ORDER 🥦*%0A%0A*ग्राहक:* ${name}%0A*पत्ता:* ${address}%0A%0A*ऑर्डर तपशील:*%0A`;
            for (let id in cart) {
                if (cart[id] > 0) {
                    const p = products.find(prod => prod.id == id);
                    msg += `✅ ${p.name} - ${cart[id]}kg = ₹${cart[id] * p.price}%0A`;
                }
            }
            msg += `%0A*एकूण बिल: ${total}*%0A_पैसे भाजी मिळाल्यावर द्या (COD)_`;
            window.open(`https://wa.me/917385533059?text=${msg}`);
        }

        renderProducts();
    </script>
</body>
  </html>
