<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veggy Mart Pro - ताजी भाजी थेट शेतातून</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 pb-32 font-sans">

    <header class="bg-green-600 text-white p-6 text-center shadow-xl sticky top-0 z-50 rounded-b-[40px]">
        <h1 class="text-4xl font-black italic tracking-tighter">VEGGY MART</h1>
        <p class="text-sm font-medium opacity-90 mt-1">थेट शेतातून तुमच्या किचनपर्यंत!</p>
        <div class="bg-white/20 inline-block px-4 py-1 rounded-full text-[10px] mt-3 font-bold tracking-widest uppercase">Premium Delivery Service</div>
    </header>

    <div id="product-list" class="p-4 space-y-4 max-w-md mx-auto mt-4">
        </div>

    <div class="fixed bottom-0 left-0 right-0 bg-white p-6 border-t border-gray-100 shadow-[0_-15px_30px_rgba(0,0,0,0.08)] flex justify-between items-center rounded-t-[35px] z-50">
        <div class="flex flex-col">
            <span class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">एकूण बिल</span>
            <span id="total" class="text-3xl font-black text-green-700 leading-none">₹0</span>
        </div>
        <button onclick="order()" class="bg-green-600 hover:bg-green-700 text-white px-8 py-4 rounded-2xl font-black text-lg shadow-lg active:scale-95 transition-all flex items-center gap-2">
            ऑर्डर द्या <i class="fab fa-whatsapp text-2xl"></i>
        </button>
    </div>

    <script>
        // भाज्यांची यादी (तू इथे हव्या तेवढ्या भाज्या वाढवू शकतोस)
        const products = [
            { id: 1, name: "टोमॅटो", price: 40, unit: "kg", color: "border-red-500", icon: "🍅" },
            { id: 2, name: "कांदा", price: 30, unit: "kg", color: "border-pink-400", icon: "🧅" },
            { id: 3, name: "बटाटा", price: 35, unit: "kg", color: "border-yellow-600", icon: "🥔" },
            { id: 4, name: "भेंडी", price: 60, unit: "kg", color: "border-green-500", icon: "🥦" },
            { id: 5, name: "कोबी", price: 30, unit: "नग", color: "border-green-200", icon: "🥬" },
            { id: 6, name: "मेथी", price: 20, unit: "जुडी", color: "border-green-700", icon: "🌿" }
        ];

        let cart = {};

        // स्क्रीनवर भाज्या दाखवण्यासाठी फंक्शन
        function renderProducts() {
            const list = document.getElementById('product-list');
            list.innerHTML = products.map(p => `
                <div class="bg-white p-5 rounded-[30px] shadow-sm border-l-[12px] ${p.color} flex justify-between items-center transform transition active:scale-95">
                    <div class="flex items-center gap-4">
                        <span class="text-4xl">${p.icon}</span>
                        <div>
                            <h3 class="text-xl font-extrabold text-gray-800">${p.name}</h3>
                            <p class="text-green-600 font-bold text-sm">₹${p.price} / ${p.unit}</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-3 bg-gray-50 p-2 rounded-2xl border border-gray-100">
                        <button onclick="updateQty(${p.id}, -0.25)" class="bg-white w-10 h-10 rounded-xl shadow-sm font-black text-xl text-red-500 border border-gray-100">-</button>
                        <span id="qty-${p.id}" class="w-14 text-center font-black text-gray-700 text-sm">0</span>
                        <button onclick="updateQty(${p.id}, 0.25)" class="bg-green-500 w-10 h-10 rounded-xl shadow-sm font-black text-xl text-white border border-green-600">+</button>
                    </div>
                </div>
            `).join('');
        }

        // वजन/क्वांटिटी अपडेट करण्यासाठी
        function updateQty(id, change) {
            if (!cart[id]) cart[id] = 0;
            cart[id] = Math.max(0, cart[id] + change);
            
            // डिस्प्ले अपडेट (उदा. 0.5 kg)
            const displayQty = cart[id] > 0 ? cart[id] : 0;
            document.getElementById(`qty-${id}`).innerText = displayQty;
            
            updateTotal();
        }

        // एकूण बिल मोजण्यासाठी
        function updateTotal() {
            let total = 0;
            for (let id in cart) {
                const product = products.find(p => p.id == id);
                total += cart[id] * product.price;
            }
            document.getElementById('total').innerText = "₹" + Math.round(total);
        }

        // व्हॉट्सॲपवर ऑर्डर पाठवण्यासाठी
        function order() {
            let totalAmt = document.getElementById('total').innerText;
            if (totalAmt === "₹0") return alert("कृपया किमान एक भाजी निवडा!");
            
            let userName = prompt("तुमचे नाव काय आहे?");
            let userAddress = prompt("तुमचा पूर्ण पत्ता सांगा?");
            
            if (!userName || !userAddress) return alert("ऑर्डर पूर्ण करण्यासाठी नाव आणि पत्ता आवश्यक आहे!");

            let msg = `*🥦 VEGGY MART - नवीन ऑर्डर 🥦*%0A`;
            msg += `-------------------------------%0A`;
            msg += `*ग्राहक:* ${userName}%0A`;
            msg += `*पत्ता:* ${userAddress}%0A`;
            msg += `-------------------------------%0A`;
            msg += `*ऑर्डर तपशील:*%0A`;

            let hasItems = false;
            for (let id in cart) {
                if (cart[id] > 0) {
                    const p = products.find(prod => prod.id == id);
                    msg += `✅ ${p.name} - ${cart[id]} ${p.unit} = ₹${Math.round(cart[id] * p.price)}%0A`;
                    hasItems = true;
                }
            }

            msg += `-------------------------------%0A`;
            msg += `*एकूण बिल: ${totalAmt}*%0A`;
            msg += `_पैसे भाजी मिळाल्यावर द्या (COD)_`;

            if(hasItems) {
                // तुझा व्हॉट्सॲप नंबर इथे आहे: 917385533059
                window.open(`https://wa.me/917385533059?text=${msg}`);
            }
        }

        renderProducts();
    </script>
</body>
  </html>
