<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veggy Mart - ताजी भाजी</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Hind', sans-serif; background-color: #f8fafc; }
        .veg-card { border-radius: 35px; overflow: hidden; background: white; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .btn-shadow { box-shadow: 0 4px 0 #15803d; }
        .btn-shadow:active { box-shadow: 0 0 0 #15803d; transform: translateY(4px); }
        .remove-btn { border: 2px solid #ef4444; color: #ef4444; }
    </style>
</head>
<body class="pb-44">

    <header class="bg-green-600 text-white p-6 sticky top-0 z-50 rounded-b-[45px] shadow-xl text-center border-b-4 border-yellow-400">
        <h1 class="text-3xl font-black italic tracking-tighter text-yellow-300">VEGGY MART</h1>
        <p class="text-[10px] font-bold mt-1 uppercase tracking-widest">ताजी भाजी, थेट तुमच्या दारी!</p>
    </header>

    <div id="products" class="p-4 space-y-8 max-w-md mx-auto"></div>

    <!-- Order Modal -->
    <div id="orderModal" class="fixed inset-0 bg-black/70 z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-[40px] p-8 shadow-2xl">
            <h2 class="text-2xl font-black text-green-800 mb-4 text-center">डिलिव्हरी पत्ता</h2>
            <div class="space-y-4">
                <input type="text" id="custName" placeholder="तुमचे नाव" class="w-full p-4 bg-gray-100 rounded-2xl outline-none font-bold">
                <input type="tel" id="custMobile" placeholder="मोबाईल नंबर" class="w-full p-4 bg-gray-100 rounded-2xl outline-none font-bold">
                <textarea id="custAddr" placeholder="पूर्ण पत्ता" class="w-full p-4 bg-gray-100 rounded-2xl outline-none font-bold h-24"></textarea>
                <button onclick="confirmOrder()" class="w-full bg-green-600 text-white py-4 rounded-2xl font-black text-xl btn-shadow">ऑर्डर पूर्ण करा ✅</button>
                <button onclick="closeModal()" class="w-full text-gray-400 font-bold py-2 text-center text-sm">रद्द करा</button>
            </div>
        </div>
    </div>

    <!-- Bill Footer -->
    <div class="fixed bottom-0 left-0 right-0 bg-white p-6 shadow-2xl rounded-t-[45px] z-[60] border-t border-gray-100">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div>
                <p class="text-[10px] text-gray-400 font-bold uppercase tracking-tighter">Total Bill</p>
                <p id="total-price" class="text-5xl font-black text-green-700 leading-none">₹0</p>
            </div>
            <button onclick="openModal()" class="bg-green-600 text-white px-10 py-5 rounded-[25px] font-black text-lg btn-shadow">
                ऑर्डर द्या 🛒
            </button>
        </div>
    </div>

    <script>
        const products = [
            { id: 1, name: "टोमॅटो", price: 40, unit: "किलो", img: "https://www.google.com/logos/fnbx/tomato_soup/tomato.png", type: "weight" },
            { id: 2, name: "कांदा", price: 30, unit: "किलो", img: "https://t3.ftcdn.net/jpg/00/56/64/04/360_F_56640432_S7V7TfN0T7I8xK9g6z6z8v0u2y4f5b.jpg", type: "weight" },
            { id: 3, name: "बटाटा", price: 35, unit: "किलो", img: "https://t4.ftcdn.net/jpg/00/52/63/34/360_F_52633458_S7V7TfN0T7I8xK9g6z6z8v0u2y4f5b.jpg", type: "weight" },
            { id: 4, name: "भेंडी", price: 30, unit: "किलो", img: "https://t4.ftcdn.net/jpg/01/05/20/82/360_F_105208226_S7V7TfN0T7I8xK9g6z6z8v0u2y4f5b.jpg", type: "weight" },
            { id: 5, name: "मेथी", price: 10, unit: "जुडी", img: "https://t4.ftcdn.net/jpg/02/75/62/34/360_F_275623458_S7V7TfN0T7I8xK9g6z6z8v0u2y4f5b.jpg", type: "judi" },
            { id: 6, name: "कोथिंबीर", price: 10, unit: "जुडी", img: "https://t4.ftcdn.net/jpg/00/98/64/45/360_F_98644558_S7V7TfN0T7I8xK9g6z6z8v0u2y4f5b.jpg", type: "judi" },
            { id: 7, name: "हिरवी मिरची", price: 50, unit: "किलो", img: "https://t4.ftcdn.net/jpg/00/68/34/56/360_F_68345658_S7V7TfN0T7I8xK9g6z6z8v0u2y4f5b.jpg", type: "weight" },
            { id: 8, name: "वांगी", price: 40, unit: "किलो", img: "https://t4.ftcdn.net/jpg/00/54/63/45/360_F_54634558_S7V7TfN0T7I8xK9g6z6z8v0u2y4f5b.jpg", type: "weight" }
        ];

        let cart = {};

        function render() {
            const list = document.getElementById('products');
            list.innerHTML = products.map(p => {
                let buttons = "";
                if(p.type === "judi") {
                    buttons = `
                        <button onclick="addToCart(${p.id}, 1, '1 जुडी')" class="bg-gray-50 py-3 rounded-2xl text-[10px] font-bold border border-gray-100 active:bg-green-100">१ जुडी</button>
                        <button onclick="addToCart(${p.id}, 2, '2 जुडी')" class="bg-gray-50 py-3 rounded-2xl text-[10px] font-bold border border-gray-100 active:bg-green-100">२ जुडी</button>
                        <button onclick="addToCart(${p.id}, 3, '3 जुडी')" class="bg-green-600 text-white py-3 rounded-2xl text-[10px] font-bold btn-shadow">३ जुडी</button>
                    `;
                } else {
                    buttons = `
                        <button onclick="addToCart(${p.id}, 0.25, 'पावशेर')" class="bg-gray-50 py-3 rounded-2xl text-[10px] font-bold border border-gray-100 active:bg-green-100">पावशेर</button>
                        <button onclick="addToCart(${p.id}, 0.5, 'अर्धा किलो')" class="bg-gray-50 py-3 rounded-2xl text-[10px] font-bold border border-gray-100 active:bg-green-100">अर्धा किलो</button>
                        <button onclick="addToCart(${p.id}, 1, 'एक किलो')" class="bg-green-600 text-white py-3 rounded-2xl text-[10px] font-bold btn-shadow">एक किलो</button>
                    `;
                }

                return `
                <div class="veg-card">
                    <img src="${p.img}" class="h-56 w-full object-cover" onerror="this.src='https://placehold.co/400x300?text=${p.name}'">
                    <div class="p-6">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h3 class="text-2xl font-black text-gray-800">${p.name}</h3>
                                <p class="text-green-600 font-bold">₹${p.price} / ${p.unit}</p>
                            </div>
                            <div class="flex flex-col items-end gap-2">
                                <span id="label-${p.id}" class="text-[10px] font-black text-gray-400 bg-gray-50 px-4 py-1 rounded-full uppercase">निवडा</span>
                                <button onclick="removeFromCart(${p.id})" id="remove-${p.id}" class="hidden remove-btn text-[9px] font-bold px-2 py-1 rounded-lg">काढून टाका ✖</button>
                            </div>
                        </div>
                        <div class="grid grid-cols-3 gap-2">${buttons}</div>
                    </div>
                </div>`;
            }).join('');
        }

        function addToCart(id, qty, label) {
            const p = products.find(x => x.id === id);
            cart[id] = { name: p.name, qty: qty, label: label, price: Math.round(p.price * qty) };
            
            const el = document.getElementById(`label-${id}`);
            el.innerText = label;
            el.classList.replace('text-gray-400', 'text-green-600');
            el.classList.add('bg-green-50');
            
            document.getElementById(`remove-${id}`).classList.remove('hidden');
            updateTotal();
        }

        function removeFromCart(id) {
            delete cart[id];
            const el = document.getElementById(`label-${id}`);
            el.innerText = "निवडा";
            el.classList.replace('text-green-600', 'text-gray-400');
            el.classList.remove('bg-green-50');
            
            document.getElementById(`remove-${id}`).classList.add('hidden');
            updateTotal();
        }

        function updateTotal() {
            let t = 0;
            for(let k in cart) t += cart[k].price;
            document.getElementById('total-price').innerText = "₹" + t;
        }

        function openModal() {
            if(document.getElementById('total-price').innerText === "₹0") return alert("कृपया भाजी निवडा!");
            document.getElementById('orderModal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('orderModal').classList.add('hidden'); }

        function confirmOrder() {
            const n = document.getElementById('custName').value;
            const m = document.getElementById('custMobile').value;
            const a = document.getElementById('custAddr').value;
            if(!n || !m || !a) return alert("सर्व माहिती भरा!");

            let msg = `*🥦 VEGGY MART ORDER 🥦*%0A-----------------------%0A*ग्राहक:* ${n}%0A*मोबाईल:* ${m}%0A*पत्ता:* ${a}%0A-----------------------%0A`;
            for(let id in cart) { msg += `✅ ${cart[id].name} (${cart[id].label}) - ₹${cart[id].price}%0A`; }
            msg += `-----------------------%0A*एकूण बिल: ${document.getElementById('total-price').innerText}*%0A_Cash on Delivery_`;
            window.open(`https://wa.me/917385533059?text=${msg}`);
            closeModal();
        }

        render();
    </script>
</body>
  </html>
