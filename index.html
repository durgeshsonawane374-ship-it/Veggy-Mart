<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veggy Mart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Hind', sans-serif; background-color: #f0f2f5; }
        .veg-card { border-radius: 30px; background: white; box-shadow: 0 8px 20px rgba(0,0,0,0.1); border: 1px solid #eee; }
        .emoji-box { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            background: #f9f9f9; 
            height: 160px; 
            border-radius: 30px 30px 0 0; 
            overflow: hidden;
        }
        .emoji-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .btn-shadow { box-shadow: 0 4px 0 #15803d; transition: 0.1s; }
        .btn-shadow:active { box-shadow: 0 0 0 #15803d; transform: translateY(4px); }
    </style>
</head>
<body class="pb-44">

    <header class="bg-green-600 text-white p-6 sticky top-0 z-50 rounded-b-[40px] shadow-lg text-center">
        <h1 class="text-3xl font-black italic text-yellow-300">VEGGY MART</h1>
        <p class="text-xs font-bold uppercase tracking-widest mt-1">ताजी भाजी, थेट तुमच्या दारी!</p>
    </header>

    <div id="products" class="p-4 space-y-6 max-w-md mx-auto"></div>

    <!-- Bill Footer -->
    <div class="fixed bottom-0 left-0 right-0 bg-white p-6 shadow-2xl rounded-t-[40px] z-[60] border-t border-gray-200">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div>
                <p class="text-[10px] text-gray-400 font-bold uppercase">Total Bill</p>
                <p id="total-price" class="text-4xl font-black text-green-700 leading-none">₹0</p>
            </div>
            <button onclick="openModal()" class="bg-green-600 text-white px-8 py-4 rounded-2xl font-black text-lg btn-shadow">
                ऑर्डर द्या 🛒
            </button>
        </div>
    </div>

    <!-- Address Modal -->
    <div id="orderModal" class="fixed inset-0 bg-black/70 z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-[40px] p-8 shadow-2xl">
            <h2 class="text-2xl font-black text-green-800 mb-4 text-center">पत्ता भरा</h2>
            <div class="space-y-4">
                <input type="text" id="custName" placeholder="तुमचे नाव" class="w-full p-4 bg-gray-100 rounded-2xl font-bold">
                <input type="tel" id="custMobile" placeholder="मोबाईल नंबर" class="w-full p-4 bg-gray-100 rounded-2xl font-bold">
                <textarea id="custAddr" placeholder="पूर्ण पत्ता" class="w-full p-4 bg-gray-100 rounded-2xl font-bold h-24"></textarea>
                <button onclick="confirmOrder()" class="w-full bg-green-600 text-white py-4 rounded-2xl font-black text-xl btn-shadow">Confirm ✅</button>
                <button onclick="closeModal()" class="w-full text-gray-400 font-bold py-2 text-sm">रद्द करा</button>
            </div>
        </div>
    </div>

    <script>
        const products = [
            { 
                id: 1, 
                name: "टोमॅटो", 
                price: 40, 
                unit: "किलो", 
                image: "45vjK",
                type: "weight" 
            },
            { 
                id: 2, 
                name: "कांदा", 
                price: 30, 
                unit: "किलो", 
                image: "https://images.unsplash.com/photo-1618512491029-1d3c9d0c5c3e?w=800",
                type: "weight" 
            },
            { 
                id: 3, 
                name: "बटाटा", 
                price: 35, 
                unit: "किलो", 
                image: "2xcsY",
                type: "weight" 
            },
            { 
                id: 4, 
                name: "भेंडी", 
                price: 30, 
                unit: "किलो", 
                image: "QEYnV",
                type: "weight" 
            },
            { 
                id: 5, 
                name: "मेथी", 
                price: 10, 
                unit: "जुडी", 
                image: "https://images.unsplash.com/photo-1585208798174-6cedd78e0198?w=800",
                type: "judi" 
            },
            { 
                id: 6, 
                name: "कोथिंबीर", 
                price: 10, 
                unit: "जुडी", 
                image: "https://images.unsplash.com/photo-1607305387299-a3d9611cd469?w=800",
                type: "judi" 
            },
            { 
                id: 7, 
                name: "हिरवी मिरची", 
                price: 40, 
                unit: "किलो", 
                image: "qV6iL",
                type: "weight" 
            },
            { 
                id: 8, 
                name: "वांगी", 
                price: 40, 
                unit: "किलो", 
                image: "yNSgK",
                type: "weight" 
            }
        ];

        let cart = {};

        function render() {
            const list = document.getElementById('products');
            list.innerHTML = products.map(p => {
                let options = p.type === "judi" 
                    ? [['1 जुडी', 1], ['2 जुडी', 2], ['3 जुडी', 3]]
                    : [['पावशेर', 0.25], ['अर्धा किलो', 0.5], ['एक किलो', 1]];

                return `
                <div class="veg-card">
                    <div class="emoji-box">
                        <img src="\( {p.image}" alt=" \){p.name}" class="w-full h-full object-cover">
                    </div>
                    <div class="p-5">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h3 class="text-2xl font-black text-gray-800">${p.name}</h3>
                                <p class="text-green-600 font-bold">₹${p.price} / ${p.unit}</p>
                            </div>
                            <div class="text-right">
                                <span id="label-${p.id}" class="text-[10px] font-black text-gray-400 bg-gray-100 px-3 py-1 rounded-full uppercase">निवडा</span>
                                <button onclick="remove(\( {p.id})" id="rm- \){p.id}" class="hidden block text-[10px] text-red-500 font-bold mt-1">काढून टाका ✖</button>
                            </div>
                        </div>
                        <div class="grid grid-cols-3 gap-2">
                            \( {options.map(opt => `<button onclick="add( \){p.id}, \( {opt[1]}, ' \){opt[0]}')" class="bg-gray-50 border border-gray-200 py-3 rounded-xl text-[10px] font-bold active:bg-green-100">${opt[0]}</button>`).join('')}
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function add(id, qty, label) {
            const p = products.find(x => x.id === id);
            cart[id] = { name: p.name, qty: qty, label: label, price: Math.round(p.price * qty) };
            document.getElementById(`label-${id}`).innerText = label;
            document.getElementById(`label-${id}`).className = "text-[10px] font-black text-green-700 bg-green-100 px-3 py-1 rounded-full uppercase";
            document.getElementById(`rm-${id}`).classList.remove('hidden');
            updateTotal();
        }

        function remove(id) {
            delete cart[id];
            document.getElementById(`label-${id}`).innerText = "निवडा";
            document.getElementById(`label-${id}`).className = "text-[10px] font-black text-gray-400 bg-gray-100 px-3 py-1 rounded-full uppercase";
            document.getElementById(`rm-${id}`).classList.add('hidden');
            updateTotal();
        }

        function updateTotal() {
            let t = 0;
            for(let k in cart) t += cart[k].price;
            document.getElementById('total-price').innerText = "₹" + t;
        }

        function openModal() {
            if(document.getElementById('total-price').innerText === "₹0") return alert("भाजी निवडा!");
            document.getElementById('orderModal').classList.remove('hidden');
        }

        function closeModal() { 
            document.getElementById('orderModal').classList.add('hidden'); 
        }

        function confirmOrder() {
            const n = document.getElementById('custName').value;
            const m = document.getElementById('custMobile').value;
            const a = document.getElementById('custAddr').value;
            if(!n || !m || !a) return alert("माहिती भरा!");

            let msg = `*🥦 VEGGY MART ORDER 🥦*%0A*ग्राहक:* ${n}%0A*मोबाईल:* ${m}%0A*पत्ता:* ${a}%0A%0A`;
            for(let id in cart) msg += `✅ \( {cart[id].name} ( \){cart[id].label}) - ₹${cart[id].price}%0A`;
            msg += `%0A*एकूण बिल: ${document.getElementById('total-price').innerText}*`;
            window.open(`https://wa.me/917385533059?text=${msg}`);
        }

        render();
    </script>
</body>
      </html>
