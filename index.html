<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veggy Mart - Fresh Organic Vegetables</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Hind', sans-serif; background-color: #f8fafc; }
        .veg-card { border-radius: 30px; background: white; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid #f1f5f9; overflow: hidden; }
        .img-box { height: 200px; display: flex; justify-content: center; align-items: center; background: #fff; overflow: hidden; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        .btn-shadow { box-shadow: 0 4px 0 #15803d; transition: 0.1s; }
        .btn-shadow:active { box-shadow: 0 0 0 #15803d; transform: translateY(4px); }
        .gradient-header { background: linear-gradient(135deg, #16a34a 0%, #15803d 100%); }
    </style>
</head>
<body class="pb-44">

    <header class="gradient-header text-white p-8 sticky top-0 z-50 rounded-b-[50px] shadow-xl text-center">
        <h1 class="text-4xl font-black italic text-yellow-300 tracking-tighter">VEGGY MART</h1>
        <p class="text-sm font-bold text-white/90 mt-1 uppercase tracking-wider">Fresh Organic Vegetables</p>
        <div class="mt-2 inline-block bg-yellow-400 text-green-900 px-4 py-1 rounded-full text-xs font-black">
            शेतातून तुमच्या घरापर्यंत 🚜
        </div>
    </header>

    <div id="products" class="p-4 space-y-8 max-w-md mx-auto mt-4"></div>

    <!-- Bill Footer -->
    <div class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md p-6 shadow-[0_-10px_30px_rgba(0,0,0,0.08)] rounded-t-[40px] z-[60] border-t border-gray-100">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div>
                <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Total Bill</p>
                <p id="total-price" class="text-4xl font-black text-green-700 leading-none">₹0</p>
            </div>
            <button onclick="openModal()" class="bg-green-600 text-white px-10 py-4 rounded-2xl font-black text-lg btn-shadow flex items-center gap-2">
                ऑर्डर द्या <span class="text-2xl">🛒</span>
            </button>
        </div>
    </div>

    <!-- Address Modal -->
    <div id="orderModal" class="fixed inset-0 bg-black/80 z-[100] hidden flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-sm rounded-[40px] p-8 shadow-2xl">
            <h2 class="text-2xl font-black text-green-800 mb-2 text-center">पत्ता भरा</h2>
            <p class="text-center text-gray-500 text-sm mb-6 font-bold">आम्ही तुमची ऑर्डर लवकरच पोहोचवू!</p>
            <div class="space-y-4">
                <input type="text" id="custName" placeholder="तुमचे नाव" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl font-bold focus:ring-2 focus:ring-green-500 outline-none">
                <input type="tel" id="custMobile" placeholder="मोबाईल नंबर" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl font-bold focus:ring-2 focus:ring-green-500 outline-none">
                <textarea id="custAddr" placeholder="पूर्ण पत्ता (उदा. गल्ली नं, घर नं)" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl font-bold h-24 focus:ring-2 focus:ring-green-500 outline-none"></textarea>
                <button onclick="confirmOrder()" class="w-full bg-green-600 text-white py-4 rounded-2xl font-black text-xl btn-shadow mt-4">Confirm Order ✅</button>
                <button onclick="closeModal()" class="w-full text-gray-400 font-bold py-2 text-sm">मागे जा</button>
            </div>
        </div>
    </div>

    <script>
        const products = [
            { id: 1, name: "टोमॅटो", price: 40, unit: "किलो", image: "1000391014.jpg", type: "weight" },
            { id: 2, name: "बटाटा", price: 35, unit: "किलो", image: "1000391013.jpg", type: "weight" },
            { id: 3, name: "कांदा", price: 30, unit: "किलो", image: "https://cdn-icons-png.flaticon.com/512/7230/7230868.png", type: "weight" },
            { id: 4, name: "भेंडी", price: 30, unit: "किलो", image: "1000391017.jpg", type: "weight" },
            { id: 5, name: "वांगे", price: 50, unit: "किलो", image: "1000391016.jpg", type: "weight" },
            { id: 6, name: "हिरवी मिरची", price: 40, unit: "किलो", image: "1000391015.jpg", type: "weight" },
            { id: 7, name: "मेथी", price: 10, unit: "जुडी", image: "https://cdn-icons-png.flaticon.com/512/3014/3014431.png", type: "judi" },
            { id: 8, name: "कोथिंबीर", price: 10, unit: "जुडी", image: "https://cdn-icons-png.flaticon.com/512/3257/3257253.png", type: "judi" }
        ];

        let cart = {};

        function render() {
            const list = document.getElementById('products');
            list.innerHTML = products.map(p => {
                let options = p.type === "judi" 
                    ? [['1 जुडी', 1], ['2 जुडी', 2], ['3 जुडी', 3]]
                    : [['पावशेर', 0.25], ['अर्धा किलो', 0.5], ['एक किलो', 1]];

                return `
                <div class="veg-card">
                    <div class="img-box">
                        <img src="${p.image}" alt="${p.name}" onerror="this.src='https://via.placeholder.com/400x300?text=${p.name}'">
                    </div>
                    <div class="p-6 border-t border-gray-50">
                        <div class="flex justify-between items-start mb-5">
                            <div>
                                <h3 class="text-2xl font-black text-gray-800">${p.name}</h3>
                                <p class="text-green-600 font-bold text-lg">₹${p.price} <span class="text-sm text-gray-400">/ ${p.unit}</span></p>
                            </div>
                            <div class="text-right">
                                <span id="label-${p.id}" class="text-[10px] font-black text-gray-400 bg-gray-100 px-3 py-1 rounded-full uppercase tracking-tighter">निवडा</span>
                                <button onclick="remove(${p.id})" id="rm-${p.id}" class="hidden block text-[11px] text-red-500 font-bold mt-2 hover:underline">✖ काढून टाका</button>
                            </div>
                        </div>
                        <div class="grid grid-cols-3 gap-3">
                            ${options.map(opt => `
                                <button onclick="add(${p.id}, ${opt[1]}, '${opt[0]}')" 
                                    class="bg-white border-2 border-gray-100 py-3 rounded-2xl text-[11px] font-black text-gray-600 transition-all active:scale-95 active:bg-green-50 active:border-green-200">
                                    ${opt[0]}
                                </button>`).join('')}
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function add(id, qty, label) {
            const p = products.find(x => x.id === id);
            cart[id] = { name: p.name, qty: qty, label: label, price: Math.round(p.price * qty) };
            const labelEl = document.getElementById(`label-${id}`);
            labelEl.innerText = label;
            labelEl.className = "text-[10px] font-black text-white bg-green-500 px-3 py-1 rounded-full uppercase tracking-tighter shadow-md";
            document.getElementById(`rm-${id}`).classList.remove('hidden');
            updateTotal();
        }

        function remove(id) {
            delete cart[id];
            const labelEl = document.getElementById(`label-${id}`);
            labelEl.innerText = "निवडा";
            labelEl.className = "text-[10px] font-black text-gray-400 bg-gray-100 px-3 py-1 rounded-full uppercase tracking-tighter";
            document.getElementById(`rm-${id}`).classList.add('hidden');
            updateTotal();
        }

        function updateTotal() {
            let t = 0;
            for(let k in cart) t += cart[k].price;
            document.getElementById('total-price').innerText = "₹" + t;
        }

        function openModal() {
            if(document.getElementById('total-price').innerText === "₹0") return alert("कृपया काहीतरी भाजी निवडा!");
            document.getElementById('orderModal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('orderModal').classList.add('hidden'); }

        function confirmOrder() {
            const n = document.getElementById('custName').value;
            const m = document.getElementById('custMobile').value;
            const a = document.getElementById('custAddr').value;
            if(!n || !m || !a) return alert("कृपया सर्व माहिती भरा!");

            let msg = `*🥦 VEGGY MART ORDER 🥦*%0A--------------------------%0A*ग्राहक:* ${n}%0A*मोबाईल:* ${m}%0A*पत्त्ता:* ${a}%0A--------------------------%0A%0A`;
            for(let id in cart) msg += `✅ *${cart[id].name}* (${cart[id].label}) - ₹${cart[id].price}%0A`;
            msg += `%0A*एकूण बिल: ${document.getElementById('total-price').innerText}*%0A%0A_शेतातून थेट घरापर्यंत!_`;
            window.open(`https://wa.me/917385533059?text=${msg}`);
        }

        render();
    </script>
</body>
  </html>
