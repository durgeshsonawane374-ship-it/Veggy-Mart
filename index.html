<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veggy Mart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: system-ui, sans-serif; background: #f0f2f5; }
        .veg-card { border-radius: 30px; background: white; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; margin-bottom: 20px; }
        .img-box { height: 180px; overflow: hidden; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body class="pb-52">

    <header class="bg-green-600 text-white p-6 text-center rounded-b-3xl">
        <h1 class="text-4xl font-black">VEGGY MART</h1>
        <p class="text-sm">ताजी भाजी, थेट तुमच्या दारी!</p>
    </header>

    <div id="products" class="p-4 max-w-md mx-auto"></div>

    <!-- Bottom Bar -->
    <div class="fixed bottom-0 left-0 right-0 bg-white shadow-2xl p-5 rounded-t-3xl">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div>
                <p class="text-gray-500 text-sm">Total Bill</p>
                <p id="total-price" class="text-4xl font-black text-green-700">₹0</p>
            </div>
            <button onclick="openModal()" class="bg-green-600 text-white px-8 py-4 rounded-2xl font-bold text-lg">
                ऑर्डर द्या 🛒
            </button>
        </div>
    </div>

    <!-- Modal -->
    <div id="orderModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl p-8 w-full max-w-sm">
            <h2 class="text-2xl font-bold text-center mb-6">पत्ता भरा</h2>
            <input id="custName" placeholder="तुमचे नाव" class="w-full p-4 rounded-2xl bg-gray-100 mb-3">
            <input id="custMobile" placeholder="मोबाईल नंबर" class="w-full p-4 rounded-2xl bg-gray-100 mb-3">
            <textarea id="custAddr" placeholder="पूर्ण पत्ता" class="w-full p-4 rounded-2xl bg-gray-100 h-28"></textarea>
            
            <button onclick="confirmOrder()" class="w-full mt-6 bg-green-600 text-white py-4 rounded-2xl font-bold">Confirm Order ✅</button>
            <button onclick="closeModal()" class="w-full mt-3 text-gray-500">रद्द करा</button>
        </div>
    </div>

    <script>
        const products = [
            { id: 1, name: "टोमॅटो", price: 40, unit: "किलो", image: "https://picsum.photos/id/1080/600/400", type: "weight" },
            { id: 2, name: "कांदा", price: 30, unit: "किलो", image: "https://picsum.photos/id/292/600/400", type: "weight" },
            { id: 3, name: "बटाटा", price: 35, unit: "किलो", image: "https://picsum.photos/id/312/600/400", type: "weight" },
            { id: 4, name: "भेंडी", price: 30, unit: "किलो", image: "https://picsum.photos/id/669/600/400", type: "weight" },
            { id: 5, name: "मेथी", price: 10, unit: "जुडी", image: "https://picsum.photos/id/201/600/400", type: "judi" },
            { id: 6, name: "कोथिंबीर", price: 10, unit: "जुडी", image: "https://picsum.photos/id/292/600/400", type: "judi" },
            { id: 7, name: "हिरवी मिरची", price: 40, unit: "किलो", image: "https://picsum.photos/id/669/600/400", type: "weight" }
        ];

        let cart = {};

        function render() {
            document.getElementById('products').innerHTML = products.map(p => {
                let opts = p.type === "judi" ? 
                    [['1 जुडी',1],['2 जुडी',2],['3 जुडी',3]] : 
                    [['पावशेर',0.25],['अर्धा किलो',0.5],['एक किलो',1]];

                return `
                <div class="veg-card">
                    <div class="img-box">
                        <img src="\( {p.image}" alt=" \){p.name}">
                    </div>
                    <div class="p-5">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h3 class="text-2xl font-bold">${p.name}</h3>
                                <p class="text-green-600 font-bold">₹${p.price} / ${p.unit}</p>
                            </div>
                            <div>
                                <span id="label-${p.id}" class="inline-block px-4 py-1 bg-gray-100 rounded-full text-xs font-bold">निवडा</span>
                                <button id="rm-\( {p.id}" onclick="remove( \){p.id})" class="hidden text-red-500 text-xs mt-2">काढून टाका ✖</button>
                            </div>
                        </div>
                        <div class="grid grid-cols-3 gap-2">
                            \( {opts.map(o => `<button onclick="add( \){p.id},\( {o[1]},' \){o[0]}')" class="py-3 bg-gray-50 hover:bg-green-50 border rounded-xl text-sm font-medium">${o[0]}</button>`).join('')}
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        window.add = function(id, qty, label) {
            const p = products.find(x => x.id === id);
            cart[id] = {name: p.name, qty: qty, label: label, price: Math.round(p.price * qty)};
            
            document.getElementById(`label-${id}`).innerHTML = label;
            document.getElementById(`label-${id}`).className = "inline-block px-4 py-1 bg-green-100 text-green-700 rounded-full text-xs font-bold";
            document.getElementById(`rm-${id}`).classList.remove('hidden');
            updateTotal();
        };

        window.remove = function(id) {
            delete cart[id];
            document.getElementById(`label-${id}`).innerHTML = "निवडा";
            document.getElementById(`label-${id}`).className = "inline-block px-4 py-1 bg-gray-100 rounded-full text-xs font-bold";
            document.getElementById(`rm-${id}`).classList.add('hidden');
            updateTotal();
        };

        function updateTotal() {
            let total = 0;
            for (let key in cart) total += cart[key].price;
            document.getElementById('total-price').innerText = "₹" + total;
        }

        function openModal() {
            if (document.getElementById('total-price').innerText === "₹0") {
                alert("कृपया भाजी निवडा!");
                return;
            }
            document.getElementById('orderModal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('orderModal').classList.add('hidden');
        }

        function confirmOrder() {
            alert("✅ तुमची ऑर्डर तयार आहे!\nWhatsApp वर पाठवली जात आहे...");
            // WhatsApp link येथे जोडू शकतो नंतर
        }

        // Start
        render();
    </script>
</body>
  </html>
